version: "2"
type: frontend
tech_stack:
  - Next.js 14
  - React 18
  - TypeScript
  - Tailwind CSS
  - Drizzle ORM
  - Neon (PostgreSQL)
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Landing page with URL shortener form
  - path: /login
    file: app/login/page.tsx
    auth_required: false
    description: User login page
  - path: /register
    file: app/register/page.tsx
    auth_required: false
    description: User registration page
  - path: /dashboard
    file: app/dashboard/page.tsx
    auth_required: true
    description: User dashboard with URL management
  - path: /dashboard/[new]
    file: app/dashboard/[new]/page.tsx
    auth_required: true
    description: Create new short URL
  - path: /premium
    file: app/premium/page.tsx
    auth_required: false
    description: Premium subscription page
  - path: /privacidade
    file: app/privacidade/page.tsx
    auth_required: false
    description: Privacy policy page
  - path: /termos
    file: app/termos/page.tsx
    auth_required: false
    description: Terms of service page
  - path: /como-funciona
    file: app/como-funciona/page.tsx
    auth_required: false
    description: How it works page
  - path: /[shortCode]
    file: app/[shortCode]/page.tsx
    auth_required: false
    description: Redirect short URL to original
features:
  - name: URL Shortening
    description: Create shortened URLs from long URLs
    files:
      - app/page.tsx
      - components/UrlForm.tsx
      - components/UrlResult.tsx
    entry_route: /
    user_interactions:
      - Enter long URL in input field
      - Click shorten button
      - See shortened URL result
      - Copy shortened URL to clipboard
    api_calls:
      - method: POST
        endpoint: /api/urls
    auth_required: false
  - name: User Authentication
    description: Login and register for user accounts
    files:
      - app/login/page.tsx
      - app/register/page.tsx
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click login/register button
      - See error message on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/register
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Dashboard URL Management
    description: View and manage user's shortened URLs
    files:
      - app/dashboard/page.tsx
      - components/dashboard/DashboardLinkCard.tsx
      - components/dashboard/EditModal.tsx
      - components/dashboard/StatsModal.tsx
    entry_route: /dashboard
    user_interactions:
      - View list of shortened URLs
      - Click to edit URL details
      - Click to view URL statistics
      - Delete shortened URLs
    api_calls:
      - method: GET
        endpoint: /api/urls
      - method: PUT
        endpoint: /api/urls/[id]
      - method: DELETE
        endpoint: /api/urls/[id]
    auth_required: true
  - name: URL Redirect
    description: Redirect short URLs to original URLs
    files:
      - app/[shortCode]/page.tsx
      - app/api/redirect/[shortCode]/route.ts
    entry_route: /[shortCode]
    user_interactions:
      - Visit short URL
      - Automatically redirect to original URL
    api_calls:
      - method: GET
        endpoint: /api/redirect/[shortCode]
    auth_required: false
  - name: Premium Subscription
    description: Premium subscription page for paid features
    files:
      - app/premium/page.tsx
      - components/CTAPremium.tsx
    entry_route: /premium
    user_interactions:
      - View premium plans
      - Click to subscribe
    api_calls: []
    auth_required: false
known_limitations: []
